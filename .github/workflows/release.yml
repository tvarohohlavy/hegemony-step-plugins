name: Release Wheels

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  release:
    name: Build And Publish Wheel Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the GitHub Release and upload assets
      id-token: write # to mint OIDC tokens for attestation signing
      attestations: write # to attach build provenance attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "0.9.28"
          enable-cache: false

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Verify tag matches package versions
        run: uv run python scripts/verify_release_version.py "${GITHUB_REF_NAME}"

      - name: Verify release does not already exist
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "::error::Release ${GITHUB_REF_NAME} already exists; releases are immutable."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests
        run: uv run pytest -v --tb=short

      - name: Build wheels
        run: uv run python scripts/build_wheels.py

      - name: Smoke install wheels
        run: uv run python scripts/smoke_install_wheels.py

      - name: Generate checksums
        run: sha256sum dist/*.whl > SHA256SUMS

      - name: Attest release asset provenance
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            dist/*.whl
            SHA256SUMS

      - name: Publish GitHub Release assets
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.whl SHA256SUMS \
            --title "${GITHUB_REF_NAME}" \
            --notes "Hegemony step-handler SDK and plugin wheels for ${GITHUB_REF_NAME}." \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
